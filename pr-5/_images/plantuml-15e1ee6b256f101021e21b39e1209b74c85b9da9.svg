h:1;" width="178.582" x="518.249" y="56.2969"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="160.0562" x="524.249" y="72.3638">gPTP Synchronization</text><polygon fill="#000000" points="206.8203,121.6953,216.8203,125.6953,206.8203,129.6953,210.8203,125.6953" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="70.292" x2="212.8203" y1="125.6953" y2="125.6953"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="93.8882" x="77.292" y="105.4966">Sync message</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="124.5283" x="77.292" y="120.6294">(HW timestamp t1)</text><line style="stroke:#000000;stroke-width:1;" x1="228.8203" x2="270.8203" y1="154.8281" y2="154.8281"/><line style="stroke:#000000;stroke-width:1;" x1="270.8203" x2="270.8203" y1="154.8281" y2="167.8281"/><line style="stroke:#000000;stroke-width:1;" x1="229.8203" x2="270.8203" y1="167.8281" y2="167.8281"/><polygon fill="#000000" points="239.8203,163.8281,229.8203,167.8281,239.8203,171.8281,235.8203,167.8281" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="120.8149" x="235.8203" y="149.7622">Extract timestamp</text><polygon fill="#000000" points="81.292,208.0938,71.292,212.0938,81.292,216.0938,77.292,212.0938" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="75.292" x2="222.8203" y1="212.0938" y2="212.0938"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="69.0625" x="87.292" y="191.895">Delay_Req</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="124.5283" x="87.292" y="207.0278">(HW timestamp t3)</text><polygon fill="#000000" points="206.8203,252.3594,216.8203,256.3594,206.8203,260.3594,210.8203,256.3594" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="70.292" x2="212.8203" y1="256.3594" y2="256.3594"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="75.8354" x="77.292" y="236.1606">Delay_Resp</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="126.1724" x="77.292" y="251.2935">(t2, t4 timestamps)</text><line style="stroke:#000000;stroke-width:1;" x1="228.8203" x2="270.8203" y1="300.625" y2="300.625"/><line style="stroke:#000000;stroke-width:1;" x1="270.8203" x2="270.8203" y1="300.625" y2="313.625"/><line style="stroke:#000000;stroke-width:1;" x1="229.8203" x2="270.8203" y1="313.625" y2="313.625"/><polygon fill="#000000" points="239.8203,309.625,229.8203,313.625,239.8203,317.625,235.8203,313.625" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="101.8228" x="235.8203" y="280.4263">Calculate offset</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="189.4902" x="235.8203" y="295.5591">offset = ((t2-t1) + (t3-t4)) / 2</text><polygon fill="#000000" points="510.6084,364.457,520.6084,368.457,510.6084,372.457,514.6084,368.457" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="223.8203" x2="516.6084" y1="368.457" y2="368.457"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="269.7881" x="230.8203" y="363.3911">WriteVehicle(base_ns, base_mono_ns, ...)</text><path d="M527,326.625 L527,396.625 L858,396.625 L858,336.625 L848,326.625 L527,326.625 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M848,326.625 L848,336.625 L858,336.625 L848,326.625 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="149.3857" x="533" y="343.6919">Seqlock write protocol:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="287.5171" x="533" y="358.8247">1. seq.fetch_add(1, release) // odd = writing</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="237.3262" x="533" y="373.9575">2. Write all fields with release stores</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="310.9209" x="533" y="389.0903">3. seq.fetch_add(1, release) // even = complete</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="68.4385" x="436.0867" y="426.3667">Time passes</text><polygon fill="#000000" points="533.6084,508.4922,523.6084,512.4922,533.6084,516.4922,529.6084,512.4922" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="527.6084" x2="864.3198" y1="512.4922" y2="512.4922"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="323.7114" x="539.6084" y="507.4263">ReadVehicle(out_base_ns, out_base_mono_ns, ...)</text><path d="M880,447.9609 L880,562.9609 L1175,562.9609 L1175,457.9609 L1165,447.9609 L880,447.9609 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1165,447.9609 L1165,457.9609 L1175,457.9609 L1165,447.9609 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="274.7329" x="886" y="465.0278">Seqlock read protocol (retry up to 1000x):</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="186.8242" x="886" y="480.1606">1. seq_a = seq.load(acquire)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="149.4429" x="886" y="495.2935">2. if seq_a is odd: retry</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="231.1563" x="886" y="510.4263">3. Read all fields with acquire loads</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187.1099" x="886" y="525.5591">4. seq_b = seq.load(acquire)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="168.4795" x="886" y="540.6919">5. if seq_a != seq_b: retry</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="74.0771" x="886" y="555.8247">6. Success!</text><polygon fill="#000000" points="853.3198,586.0234,863.3198,590.0234,853.3198,594.0234,857.3198,590.0234" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2.0,2.0;" x1="522.6084" x2="859.3198" y1="590.0234" y2="590.0234"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="172.2183" x="529.6084" y="584.9575">vehicle_base_ns, accuracy</text><line style="stroke:#000000;stroke-width:1;" x1="875.3198" x2="917.3198" y1="624.1563" y2="624.1563"/><line style="stroke:#000000;stroke-width:1;" x1="917.3198" x2="917.3198" y1="624.1563" y2="637.1563"/><line style="stroke:#000000;stroke-width:1;" x1="870.3198" x2="917.3198" y1="637.1563" y2="637.1563"/><polygon fill="#000000" points="880.3198,633.1563,870.3198,637.1563,880.3198,641.1563,876.3198,637.1563" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="305.7603" x="882.3198" y="619.0903">current = base_ns + (now_mono - base_mono)</text><!--SRC=[XLF1RXen4BtxAoOvxQfX4mZjOQMjLAMLScYa2ABa4Wavte6rQkp57WBqwpkxNbXeg7goXttptfl7-88gN2BKHcehH2qzQQLhQGak5uzFZ_0W0w6_11cwwoc6miwgCiydsv_ErIqiNazXqqfwBASa2LlCzFxX571dDFBvhOuSiHIYAA1rCMMLoZkhVqlIpa9H217jmE1hfvYtA5XY27A1hpQvVm7IN99Sra33L4X5-fqjx2t6uvZXnvOye_g-8qpKo-4x6hcRJN3rGU8s5IN-BNB6vvuXr4n1eokWSKyJFleyO_HE6hKs3SRDvm7frSOJ2aYOSi3ZmYT8w7P0upI5QnWTit3yERnuJVYCbLO6apSPS6R35RINfREkhR8iIuLrBEFreY81CCMLSUeNR9fkgBq